services:
  postgres:
    image: postgres:15-alpine
    container_name: livecode-postgres
    environment:
      POSTGRES_DB: livecode_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: livecode-redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: livecode-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/livecode_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgrespwd
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for DooD

volumes:
  postgres_data:
